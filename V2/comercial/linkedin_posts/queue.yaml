  - id: t-ssot-core
    tema: technical-deep-dive
    angulo: "§4.1 SSoT src/core/ — 15 módulos consolidando 3 pipelines (treino/produção/monitoramento). Nasceu de incidente de divergência em mar/2026, não de planejamento."
    tom: confidente-tecnico
    comprimento: long
    publico: tecnico
    notas: "Contrato transform(df, config, **artifacts). 6 arquivos de matching → 1. 3 de Medium → 1."
    prioridade: alta

  - id: b-470k
    tema: business-value
    angulo: "§6.1 R$ 470k de margem incremental auditável contra grupo de controle em 4 meses. 5 de 7 A/B com p<0,05."
    tom: mostra-resultado
    comprimento: medium
    publico: negocio
    notas: "Usar a versão honesta (5/7 com p<0,05) em vez de 12/12. Mencionar tracking rate 14,8–65% como nota de honestidade."
    prioridade: alta

  - id: w-feedback-loop
    tema: war-story
    angulo: "§5.5 Meu modelo treinou em dados que ele mesmo produziu por 3 meses. D10 chegou a 41% dos leads (esperado ~10%)."
    tom: honesto-com-bug
    comprimento: medium
    publico: misto
    notas: "Lição: grupo controle não é luxo, é infraestrutura. Ativado só em 15/03/2026."
    prioridade: media

  - id: d-ab-events
    tema: design-decision
    angulo: "§4.4 A/B testing via UTM com event names CAPI distintos (LeadQualified vs LeadQualifiedCha). ROAS por variante vira leitura direta no Ads Manager, sem contrafactual."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Explicar por que não bastava split interno — Meta precisa ver eventos separados pra atribuir compras."
    prioridade: media

  - id: j-budismo-ml
    tema: career
    angulo: "§8 Vendi uma escola de budismo e fui estudar machine learning. Hoje meu modelo roda em produção com AUC 0.745 e 59 features."
    tom: celebrando-marco
    comprimento: medium
    publico: misto
    notas: "Não romantizar a transição — focar no que foi difícil e no que o background de captação (120+ ciclos) trouxe."
    prioridade: media

  - id: w-deploy-100
    tema: war-story
    angulo: "§5.3 Deployei um modelo novo com 100% de tráfego. D10 caiu de 20% para 5% em 48h. Rollback levou ~10 dias."
    tom: honesto-com-bug
    comprimento: short
    publico: tecnico
    notas: "Fechar com a correção estrutural: --no-traffic + canary 5→10→100% + progression gate (T1-9, T2-7)."
    prioridade: media

  - id: m-tier1-fechado
    tema: milestone
    angulo: "§7 Safeguard Tier 1 fechado — 11 itens, 11 classes de bug que não vão mais acontecer em silêncio (fail-loud, parity audit, CAPI alert por decil, dedup webhook, timezone UTC, progression gate, coverage check, smoke pós-deploy, validador pré-encoding, feature-report endpoint)."
    tom: celebrando-marco
    comprimento: medium
    publico: tecnico
    notas: "Cada item é um bug passado materializado como teste. Conecta com §5 inteiro."
    prioridade: media

  - id: i-kahneman-linear
    tema: meta-insight
    angulo: "Lead scoring por regras está matematicamente errado. Trata variáveis como independentes — e Kahneman chamou isso de 'ilusão da validade' em modelos lineares há 50 anos."
    tom: contrarian
    comprimento: medium
    publico: negocio
    notas: "Contraste: RandomForest captura que o peso de uma variável muda dependendo do valor das outras. Impossível mapear manualmente com 40–100 variáveis."
    prioridade: media

  - id: d-utm-allowlist
    tema: design-decision
    angulo: "§4.7 Uma linha de config (utm_source_allowlist) e o Meta parou de aprender com leads que ele mesmo nunca gerou. Leads Google/orgânicos poluíam o sinal — descoberta de abr/2026."
    tom: confidente-tecnico
    comprimento: short
    publico: tecnico
    notas: "1 linha de YAML resolve o que uma refatoração grande resolveria no futuro. Mitigar agora, refatorar quando 2º canal pago entrar."
    prioridade: baixa

  - id: w-capi-valor-3x
    tema: war-story
    angulo: "§5.7 Errei 3 vezes o valor enviado ao Meta antes de acertar. Cada erro virou um trimestre de ajuste. O número que você manda pro Meta É a função-objetivo do algoritmo dele."
    tom: honesto-com-bug
    comprimento: medium
    publico: misto
    notas: "v1 hardcoded → v2 quebra D1→D01 → v3 ticket simples → v4 ticket Guru real × fator TMB. Conecta com §4.9 (fail-loud)."
    prioridade: baixa

  - id: t-clientconfig-153
    tema: technical-deep-dive
    angulo: "§4.2 153 hardcodes de um cliente extraídos para uma ClientConfig dataclass com 15 sub-configs. Onboarding de cliente novo virou 1 YAML."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Paralelo com Django settings — mas tipado. Cada sub-config tem validação via dataclass."
    prioridade: baixa

  # ─── Adições de 2026-04-24 — expansão do catálogo a partir do portfolio doc ───

  - id: w-d9-sem-eventos
    tema: war-story
    angulo: "§5.1 D9 sem eventos CAPI por 2 meses. Bug de string: código comparava 'D9' mas o sistema formatava decis como 'D09'. Zero alerta — só descoberto em auditoria de distribuição."
    tom: honesto-com-bug
    comprimento: short
    publico: misto
    notas: "Pagou o T1-2 (alerta CAPI por decil com 0 eventos). Curto, punchy, reconhecível para qualquer engenheiro."
    prioridade: media

  - id: w-divergencia-sistemica
    tema: war-story
    angulo: "§5.4 Encoding, Medium e UTM aplicavam regras diferentes entre treino e produção há meses. Mascarado porque o modelo antigo foi treinado e servido com as mesmas regras erradas. Descoberto ao trocar de modelo — score não bateu."
    tom: honesto-com-bug
    comprimento: medium
    publico: tecnico
    notas: "O incidente fundador — motivou o refactor src/core/ inteiro. Pode também virar meta-insight contrarian (i-parity-teorema)."
    prioridade: media

  - id: w-evento-otim-sem-controle
    tema: war-story
    angulo: "§5.6 Mudei o evento de otimização de LQHQ (só D9-D10) para LQ (todos decis) em todas as campanhas de uma vez, sem A/B. Meta recalibrou para audiência mais ampla. D10 caiu de ~42% para ~30% em 2 dias."
    tom: honesto-com-bug
    comprimento: medium
    publico: negocio
    notas: "Correção estrutural: A/B via UTM com event names distintos (§4.4). Lição: mudança que altera o perfil aprendido pelo Meta precisa de sub-conjunto ou budget reduzido."
    prioridade: baixa

  - id: w-timezone-3x
    tema: war-story
    angulo: "§5.8 O mesmo bug de timezone apareceu em 3 componentes diferentes (monitoramento × Sheets, filtro com sinal invertido, Railway × hora do servidor). Causa raiz: não estabelecer convenção explícita de UTC no início."
    tom: honesto-com-bug
    comprimento: short
    publico: tecnico
    notas: "Correção estrutural: regra dura datetime.now(timezone.utc) (T1-4). Post curto, reconhecível."
    prioridade: baixa

  - id: w-utm-fantasma
    tema: war-story
    angulo: "§5.9 Origens de UTM novas em produção (ig, manychat, org, campo vazio) criavam variáveis fantasma no modelo — features zeradas sem alerta. Três correções reativas em 2 meses. Reincidiu em UTM Term (DT-13)."
    tom: honesto-com-bug
    comprimento: medium
    publico: tecnico
    notas: "Lição: unificação de UTM precisa ser whitelist estrita, sem exceções condicionais que 'preservam casos'."
    prioridade: baixa

  - id: w-fbp-fbc-4x
    tema: war-story
    angulo: "§5.10 Calculei o percentual de cobertura de cookies FBP/FBC de 4 formas erradas no mesmo dia. Cada correção resolvia um problema e criava outro porque não havia número de referência externo para validar."
    tom: honesto-com-bug
    comprimento: medium
    publico: misto
    notas: "Lição meta: cálculo incremental sem total auditável acumula erros. Precisa sempre de um segundo número independente para bater."
    prioridade: baixa

  - id: w-janela-tmb
    tema: war-story
    angulo: "§5.11 Dois bugs silenciosos no dataset de treino por meses: janela de conversão só removia compradores do fim (não não-compradores), criando padrão falso; filtro TMB aplicado depois do matching deixava inadimplentes contaminarem o sinal positivo."
    tom: honesto-com-bug
    comprimento: medium
    publico: tecnico
    notas: "Descoberto na auditoria do refactor (06/03/2026). Bom post para quem trabalha com datasets de propensão."
    prioridade: baixa

  - id: d-pipelines-dict
    tema: design-decision
    angulo: "§4.3 Padrão A2 — pipelines: Dict[str, LeadScoringPipeline] indexado por client_id. Suporta N clientes em um único serviço Cloud Run com um header X-Client-ID: devclub."
    tom: confidente-tecnico
    comprimento: short
    publico: tecnico
    notas: "Decisão aparentemente trivial mas com impacto grande em custo operacional. Não precisa subir 1 Cloud Run por cliente."
    prioridade: baixa

  - id: d-parity-audit
    tema: design-decision
    angulo: "§4.5 train_pipeline.py --capture-parity-snapshots captura (input, output) de 4 transformações críticas. tests/parity_audit.py compara coluna-a-coluna treino vs produção, falha alto em divergência, lista top 3 divergentes. Foi o teste que pegou o bug da Medium_Linguagem_programacao zerada."
    tom: confidente-tecnico
    comprimento: long
    publico: tecnico
    notas: "Detalhar o contrato: snapshots são o oracle. Conecta com i-parity-teorema como meta-insight."
    prioridade: media

  - id: d-validator-pre-enc
    tema: design-decision
    angulo: "§4.8 Validador pré-encoding (T1-11) — snapshot do treino como contrato offline + validação runtime com tolerância de missing configurável por feature. Endpoint /monitoring/feature-report."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "A proposta que materializou a lição da Medium zerada em gate automático."
    prioridade: baixa

  - id: d-fail-loud
    tema: design-decision
    angulo: "§4.9 Regra de engenharia em CLAUDE.md: todo transform novo em src/core/ inclui pelo menos um assert que quebra alto se output for inesperadamente zero/nulo. Se remover o assert não causaria confusão em produção, não precisa. Se causaria — obrigatório."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Motivado por Medium zerada + D9 sem eventos. Contrário à cultura 'silenciosa e resiliente'."
    prioridade: media

  - id: d-progression-gate
    tema: design-decision
    angulo: "§4.10 Progression gate (T2-7) — script que bloqueia promoção canary → 100% se AUC, distribuição de decis ou taxa de envio CAPI não estiverem dentro de bandas esperadas. Complementa o protocolo manual de deploy."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Feito após o incidente de deploy 100% sem canary (§5.3). Encadeia com w-deploy-100."
    prioridade: baixa

  - id: b-209k-clean
    tema: business-value
    angulo: "§6.2 R$ 209k de ganho auditável em 2 lançamentos clean (LF43+LF44, sem nenhum flag metodológico). +167¢ extras por R$1 investido. Número que não depende de premissa sobre baseline."
    tom: mostra-resultado
    comprimento: medium
    publico: negocio
    notas: "Versão mais honesta que R$470k — só os 2 lançamentos sem qualquer flag. Público que respeita rigor metodológico."
    prioridade: media

  - id: b-zero-canibalizacao
    tema: business-value
    angulo: "§6.3 Uma das perguntas mais importantes em A/B de canal: o ML canibaliza o controle? Correlação de Pearson entre % budget ML e ROAS do controle: −0,23. Para canibalização real seria necessário ≤ −0,70."
    tom: mostra-resultado
    comprimento: medium
    publico: negocio
    notas: "Raro alguém testar isso. Pode virar meta-insight para growth/analytics."
    prioridade: baixa

  - id: b-mecanica-cpl
    tema: business-value
    angulo: "§6.4 Mecanismo: ML envia sinais de alta propensão via LeadQualified calibrado. Meta aprende a encontrar esse perfil mais eficientemente no leilão → CPL 27–44% menor. Com custo menor e taxa de conversão equivalente/superior, ROAS sobe estruturalmente."
    tom: confidente-tecnico
    comprimento: medium
    publico: misto
    notas: "Post explicador do 'porquê funciona'. Mix técnico/negócio."
    prioridade: baixa

  - id: b-model-specs
    tema: technical-deep-dive
    angulo: "§6.5 Modelo em produção: RandomForest, 59 features, AUC 0.745, ~49k leads de treino, 777 positivos, n_estimators=200 max_depth=8 max_features=log2 min_samples_leaf=3 class_weight=balanced."
    tom: confidente-tecnico
    comprimento: short
    publico: tecnico
    notas: "Specs nuas para comparação. Pode funcionar como carrossel."
    prioridade: baixa

  - id: j-bootstrap-reativo
    tema: journey
    angulo: "§7 Fase 1 (nov/25–fev/26): cada componente novo (banco, CAPI, MLflow, deploy) estreou com bug de integração descoberto em produção. Causa raiz: ausência de testes de integração no período de bootstrap."
    tom: honesto-com-bug
    comprimento: medium
    publico: tecnico
    notas: "A fase 'amadora' honesta. Bom contraste com as fases seguintes."
    prioridade: baixa

  - id: j-consolidacao
    tema: journey
    angulo: "§7 Fase 2 (fev–mar/26): refactor de consolidação. 6 arquivos de matching → 1. 3 de Medium → 1. 153 hardcodes → ClientConfig. A decisão não foi planejada — nasceu de um incidente de divergência treino/produção."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Lição: refactors bons nascem de dor real, não de desejo de elegância."
    prioridade: baixa

  - id: j-arco-completo
    tema: journey
    angulo: "§7 De bootstrap reativo a Safeguards Tier 1 em 12 meses. Cada fase endereça a dor da anterior: bugs de integração → consolidação → automação de quality gates. Próximas (CI, feature store, model registry) só entram quando a atual virar gargalo real."
    tom: celebrando-marco
    comprimento: long
    publico: tecnico
    notas: "Post de arco completo — bom como resumo de ano ou marco intermediário."
    prioridade: media

  - id: i-56x-aprendizado
    tema: meta-insight
    angulo: "A aritmética: 100 leads/dia. LeadQualified em 5 min → 30–40 eventos de otimização no mesmo dia. Purchase em 21 dias → 10 eventos. Diferença: 56× mais sinal para o algoritmo aprender. Esperar Purchase é escolher aprender 56× mais devagar."
    tom: contrarian
    comprimento: medium
    publico: negocio
    notas: "Explicador do core value prop com números em vez de adjetivos. Funciona para marketing/growth."
    prioridade: media

  - id: i-parity-teorema
    tema: meta-insight
    angulo: "Consistência entre treino e produção é um teorema que se prova continuamente com testes — não um acordo de cavalheiros entre versões do código. Sem parity audit rodando a cada mudança, você tem um modelo diferente em produção eventualmente."
    tom: contrarian
    comprimento: medium
    publico: tecnico
    notas: "Declaração mais forte e abstrata a partir da §5.4. Gera discussão."
    prioridade: baixa

  - id: i-feature-registry
    tema: meta-insight
    angulo: "Feature registry não é detalhe de engenharia — é o contrato entre treino e produção. O modelo aprendeu com N features em ordem X. Se a ordem muda no serving (e nada impede), o score deixa de fazer sentido. MLflow é o lugar canônico desse contrato."
    tom: confidente-tecnico
    comprimento: medium
    publico: tecnico
    notas: "Conceito simples mas frequentemente ignorado por quem acabou de entrar em MLOps."
    prioridade: baixa

