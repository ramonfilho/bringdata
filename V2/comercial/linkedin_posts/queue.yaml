# Fila de posts LinkedIn — Bring Data V2
#
# Mantida pela skill /linkedin. Editável manualmente se quiser reordenar.
# Fonte dos números/claims: V2/docs/portfolio_linkedin.md
#
# Comandos da skill:
#   /linkedin          → puxa próximo de `pending`, sugere/confirma/compõe
#   /linkedin scan     → varre commits novos desde meta.last_scanned_commit e propõe adições
#   /linkedin queue    → mostra fila completa
#   /linkedin <tema>   → bypass da fila, compõe ad-hoc (não consome da fila)
#
# Rotação automática: a skill evita 2 itens consecutivos com mesmo `tema` ou `tom`.
# Se quiser forçar, use `/linkedin force <id>`.

meta:
  last_scanned_commit: "1a4d0f8"
  last_post_date: null
  recent_tones: []       # preenchido automaticamente a cada post
  recent_themes: []      # idem
  target_cadence: "3x/semana"

