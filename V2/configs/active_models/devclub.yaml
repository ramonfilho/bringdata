active_model:
  model_name: v1_devclub_rf_temporal_leads_single_jan30
  mlflow_run_id: d51757f5041c44b7ab1a056fce8c3c35
  trained_at: '2026-01-30T09:02:24.891076'
  split_method: temporal_leads
  performance:
    auc: 0.7311
    monotonia_percentage: 88.89
    lift_maximum: 2.65
  # Champion = jan30 — modelo em produção desde 30/01/2026 (servido via rollback edf23e9
  # até 29/04/2026, depois servido pela revisão main com o mesmo run_id após reativação
  # do A/B test interno por UTM).

# Para mudar o modelo ativo:
# 1. Treine um novo modelo: python -m src.train_pipeline --set-active
# 2. Ative um run existente: python -m src.train_pipeline --activate-run <run_id>

# =============================================================================
# A/B test reativado (29/04/2026) — Challenger abr28 via tag LEADHQLB no campaign
# =============================================================================
# Champion (default, sem match): jan30 (active_model acima)
# Challenger: abr28 — T2-3 alpha=1, importance weighting CONTROLE/ML/NEUTRO
#
# Roteamento (substring case-insensitive, ver src/core/client_config.py:match_variant):
#   - utm_campaign contendo "LEADHQLB" → Challenger abr28
#     ex: "DEVLF | CAP | FRIO | FASE 04 | ADV | LEAD | PG1 | 2026-05-26 | LEADHQLB|..."
#   - OU URL contendo "ml-parabens-psq-devf" → Challenger abr28 (redundância pós-form)
#   - qualquer outro UTM/URL → default (jan30)
#
# Histórico do pattern:
#   29/04/2026 → 27/05/2026:  utm_campaign contendo "PIXEL NOVO API"
#   27/05/2026 → 27/05/2026:  utm_campaign contendo "utm_pixel"  (transitório)
#   27/05/2026 → presente:    utm_campaign contendo "LEADHQLB"
#
# Eventos Meta:
#   - Default arm (jan30): LeadQualified (com valor) + LeadQualifiedHighQuality (D9-D10)
#   - Challenger (abr28): HQLB_LQ (D1-D10, value=0 — não criado no Pixel = ignorado pela Meta)
#                       + HQLB (apenas D9-D10 — evento que o gestor otimiza)
#
# Pixel destino: 1513132406527995 (HQLB criado em 29/04/2026 via test event TEST25625)
# =============================================================================
ab_test:
  enabled: true
  variants:
    # =============================================================================
    # Champion shim (DT-12 + correção 02/05/2026, Patch B 08/05/2026)
    # =============================================================================
    # Esta entrada NÃO faz roteamento (utm_pattern vazio + sem url_pattern → nunca
    # matcheia em match_variant). Existe apenas para hospedar encoding_overrides
    # do Champion jan30, que foi treinado com ordinal encoding em idade e salário.
    #
    # O código em api/app.py:937-943 (síncrono) e :3373-3380 (batch) busca o variant
    # cujo run_id == active_model.mlflow_run_id quando o lead vai pelo path Champion
    # (ab_v=None). Sem esta entrada, enc_overrides_single=None → jan30 recebe OHE →
    # idade/salário ficam zeradas no passo 7 do encoding (~8.2% de feature importance
    # perdida). Bug confirmado por logs T1-10 no Cloud Run em 02/05/2026.
    #
    # ATENÇÃO: capi_event_name e conversion_rates DESTE shim SÃO LIDOS em produção.
    # api/app.py:1016 e :3516 setam lead['ab_conversion_rates'] = ab_variant.conversion_rates
    # quando o lead bate path A/B Champion. Isso vira conversion_rates_override em
    # capi_integration.py:347 e tem prioridade sobre business_config.conversion_rates
    # do client. Logo, todo decil precisa ter rate correto aqui — comentário antigo
    # afirmando "NUNCA são lidos" estava errado e causou bug VAL=0 parcial no canary
    # 00403-cez (08/05/2026). Os values aqui devem ser back-calculados de
    # LEAD_VALUE_BY_DECILE_CHAMPION ÷ product_value (ver api/business_config.py).
    # Solução arquitetural completa em DT-17 (PLANO_REFACTOR_MLOPS.md).
    # =============================================================================
    champion_jan30:
      run_id: d51757f5041c44b7ab1a056fce8c3c35   # mesmo do active_model
      # Frente 2 — metadado do MONITORAMENTO (inerte pro roteamento; match_variant ignora):
      role: champion
      campaign_tag: "LEADQUALIFIED"              # tag no nome da campanha = balde Champion (classificador)
      display_name: "Anterior (jan_30)"          # rótulo no relatório (campanha LEADQUALIFIED desligada)
      utm_pattern: {}                            # vazio = nunca matcheia
      # sem url_pattern (None) — também nunca matcheia
      capi_event_name: LeadQualified
      capi_event_name_high_quality: LeadQualifiedHighQuality
      conversion_rates:                          # back-calculado de LEAD_VALUE_BY_DECILE_CHAMPION ÷ 1563.75
        D01: 0.000966   # 1.51 / 1563.75
        D02: 0.001260   # 1.97 / 1563.75
        D03: 0.001260   # 1.97 / 1563.75
        D04: 0.001260   # 1.97 / 1563.75
        D05: 0.003595   # 5.62 / 1563.75
        D06: 0.003595   # 5.62 / 1563.75
        D07: 0.003595   # 5.62 / 1563.75
        D08: 0.004317   # 6.75 / 1563.75
        D09: 0.004969   # 7.77 / 1563.75
        D10: 0.009573   # 14.97 / 1563.75
      encoding_overrides:
        ordinal_variables:
          "Qual a sua idade?":
            - "menos de 18 anos"
            - "18 24 anos"
            - "25 34 anos"
            - "35 44 anos"
            - "45 54 anos"
            - "mais de 55 anos"
          "Atualmente, qual a sua faixa salarial?":
            - "nao tenho renda"
            - "entre r1000 a r2000 reais ao mes"
            - "entre r2001 a r3000 reais ao mes"
            - "entre r3001 a r5000 reais ao mes"
            - "mais de r5001 reais ao mes"

    challenger_abr28:
      run_id: 5d158f0aa6e54b489498470446194a6c
      # Frente 2 — metadado do MONITORAMENTO (inerte pro roteamento; match_variant ignora):
      role: challenger
      campaign_tag: "HQLB"                       # substring p/ classificador (cobre LEADHQLB/HQLB/HQLB_LQ) = balde Challenger
      display_name: "Champion (abr_28)"          # rótulo no relatório (venceu o A/B, virou produção)
      utm_pattern:
        utm_campaign: "LEADHQLB"                 # match substring case-insensitive → bate em "DEVLF | ... | LEADHQLB|..."
      url_pattern: "ml-parabens-psq-devf"        # OR com utm_pattern — redundância (URL exclusiva pós-form Challenger)
      pixel_id_override: "1513132406527995"      # CAPI Challenger envia pro pixel novo (onde HQLB está cadastrado)
      capi_event_name: HQLB_LQ
      capi_event_name_high_quality: HQLB
      capi_high_quality_decils: ['D08', 'D09', 'D10']   # Estende HQLB pra incluir D8 (lift 1.32 ≈ D9 lift 1.27 no Challenger; D7 fica fora — lift 1.06 ≈ baseline).
                                                        # Champion mantém global D09+D10 (não declara este campo). Rollback: deletar linha → cai pro fallback global.
      conversion_rates:                          # back-calculado de LEAD_VALUE_BY_DECILE_CHALLENGER ÷ 1563.75 (Patch B 08/05/2026)
        D01: 0.000454   # 0.71 / 1563.75
        D02: 0.001816   # 2.84 / 1563.75
        D03: 0.001816   # 2.84 / 1563.75
        D04: 0.003076   # 4.81 / 1563.75
        D05: 0.003076   # 4.81 / 1563.75
        D06: 0.004918   # 7.69 / 1563.75
        D07: 0.005896   # 9.22 / 1563.75
        D08: 0.007635   # 11.94 / 1563.75
        D09: 0.007635   # 11.94 / 1563.75
        D10: 0.013231   # 20.69 / 1563.75
      # Taxa histórica de conversão por faixa de decil DO CHALLENGER, pro ML-aware do
      # revenue_forecast (matched/leads_DB; ÷tracking_rate em runtime). Champion usa a
      # business.conversion_rate_benchmark global. Derivada como Champion × lift por faixa,
      # onde o lift = razão challenger/champion medida lead-a-lead no backtest (re-bin dos
      # parquets scored_jan30 vs scored_abr28 com os thresholds de produção, LF43-48):
      # D1-5=1.41x · D6-9=0.99x · D10=1.34x. Rollback: deletar este bloco → cai no business.
      conversion_rate_benchmark:
        periodo_referencia: "Champion × lift (re-bin parquet jan30 vs abr28, LF43-48)"
        D1_D5: 0.0041    # 0.0029 (Champion) × 1.41
        D6_D9: 0.0069    # 0.0070 (Champion) × 0.99
        D10:   0.0143    # 0.0107 (Champion) × 1.34
