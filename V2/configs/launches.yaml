# launches.yaml — Datas de cada lançamento DevClub
#
# Fonte: Controle de Vendas Global (Google Sheets)
# Campos:
#   cap_start / cap_end   — período de captação (leads preenchem pesquisa)
#   vendas_start / vendas_end — período de vendas (carrinho aberto)
#   notes                 — observações do cliente (opcional)
#
# Usado por:
#   validate_ml_performance.py --lf LFxx    (carrega datas automaticamente)
#   ml_evolution_report.py                   (mapeia vendas_start → nome)
#   gerar_evolucao_margem.py                 (mapeia vendas_start → nome)

