# configs/clients/devclub.yaml
# Configuração do cliente DevClub para o pipeline MLOps refatorado.
#
# ESTADO: Completo para pipelines ML core (train + production + monitoring).
# Campos null restantes:
#   - infra.*      — valores via env vars (GCP_PROJECT_ID, INTERNAL_API_URL, etc.)
#   - capi.*       — valores via env vars (META_PIXEL_ID, etc.)
#   - monitoring.* — maioria: componente ainda não migrado para core/
#   - api.*        — não prioritário para Fase 2 ML core
#   - feature.ordering_rules — lógica de código, não config simples
#
# Referência de hardcodes: V2/docs/PLANO_REFACTOR_MLOPS.md, Seção 6.

client_id: devclub

# ---------------------------------------------------------------------------
# InfraConfig — hardcodes #101, #102, #120, #124, #150, #153
# ---------------------------------------------------------------------------
infra:
  gcp_project_id: null          # #101, #153 — usar env var GCP_PROJECT_ID
  cloud_run_url: null            # #124 — usar env var INTERNAL_API_URL
  validation_bucket: null        # #120, #136
  bigquery_dataset_id: null      # #102
  bigquery_table_id: null        # #102
  guru_api_base_url: null        # #150
  guru_api_transactions_endpoint: null  # #150

# ---------------------------------------------------------------------------
# IngestionConfig — hardcodes #6–#26, #38, #57–#62, #68–#69
# ---------------------------------------------------------------------------
ingestion:
  training_data_dir: null        # path local ao dataset de treino (definido por argumento CLI)
  tmb_detection_columns:         # #6 — colunas que identificam arquivo TMB de parcelas
    - "Pedido"
    - "Parcela"
    - "Grau de risco"
  bare_campaign_names:           # #8 — prefixos de campanha incompletos a ignorar
    - "DEVLF"
    - "devlf"
  api_source_name: "API Guru"    # #11 — nome da fonte de dados da API Guru nos logs
  has_tmb: true                  # #12 — DevClub usa TMB (plataforma de pagamento parcelado)
  sales_platform_identifier: "guru"  # #21 — identificador da plataforma de vendas no nome do arquivo
  approved_status_value: "Aprovada"  # #22
  tmb_risk_column: "Grau de risco"   # #23
  tmb_risk_values: ["Baixo", "Médio"]  # #62 — 'low'=first, 'low_medium'=all
  tmb_risk_filter_default: "all"     # #26
  product_filter_keyword: "devclub"  # #24
  pesquisa_date_column: "Data"       # #25
  lf_file_prefix: "LF"           # #57 — prefixo dos arquivos de leads do lançamento
  lf_guru_exception_files:       # #57 — arquivos LF que mantêm abas TMB/Guru (exceção à regra)
    - "LF06"
  local_sales_filename_identifier: "guru"  # #58 — identificador de arquivo de vendas local (excluído: substituído pela API)
  min_survey_columns: 10         # #59 — mínimo de colunas para considerar aba com survey
  score_column_prefixes:         # #60 — prefixos de colunas de score a remover por pattern matching
    - "score"
    - "faixa"
    - "pontuação"
    - "pontuacao"
    - "lead_score"
    - "decil"
  vendas_utm_columns_to_remove: ["source", "medium", "campaign", "content"]  # #61
  columns_to_remove:             # #69 — colunas a remover (score/técnicas sempre ausentes em produção)
    - "Pontuação"
    - "Score"
    - "Faixa"
    - "Faixa A"
    - "Faixa B"
    - "Faixa C"
    - "Faixa D"
    - "Remote IP"
    - "User Agent"
    - "fbc"
    - "fbp"
    - "cidade"
    - "estado"
    - "pais"
    - "cep"
    - "externalid"
    - "Page URL"
    - "Qual estado você mora?"
  column_rename_mapping:         # #68 — renomeação de colunas com nomes longos de formulário
    "Já investiu em algum curso online para aprender uma nova forma de ganhar dinheiro?": "investiu_curso_online"
    "O que mais te chama atenção na profissão de Programador?": "interesse_programacao"
  dataset_cutoff_date: null      # #38 — MANTER NULL: auto-detecção via features tardias.
                                  # O valor "2025-03-01" do hardcode original era um MÍNIMO na lógica
                                  # antiga (auto-detecção ainda rodava depois). Em core/dataset_versioning.py,
                                  # valor não-null substitui completamente a auto-detecção → 168k rows vs
                                  # 49k esperados. Resultado validado com null: 49,214 leads ✅
  column_unification:            # #13–#20
    pesquisa_merges:             # #13, #14, #15
      - cols:
          - "Já investiu em algum curso online para aprender uma nova forma de ganhar dinheiro?"
          - "Já investiu em algum curso online para aprender uma nova forma de ganhar dinheiro? "
        target: "investiu_curso_online"
      - cols:
          - "O que mais te chama atenção na profissão de Programador?"
          - "O que mais te chama atenção na profissão de Programador? "
        target: "interesse_programacao"
      - cols:
          - "Atualmente, qual a sua faixa salarial?"
          - "Atualmente, qual a sua faixa salar"
        target: "Atualmente, qual a sua faixa salarial?"
    valor_columns: ["Ticket (R$)", "valor produtos"]            # #16
    produto_columns: ["Produto", "Lançamento", "nome produto"]  # #17
    nome_columns: ["Cliente Nome", "nome contato"]              # #18
    email_columns: ["Cliente Email", "email contato"]           # #19
    telefone_columns: ["Telefone", "telefone contato"]          # #20

# ---------------------------------------------------------------------------
# UTMConfig — hardcodes #35, #63, #67 (Componente 1 — Fase 2)
# ---------------------------------------------------------------------------
utm:
  source_to_outros:              # #35 — lista canônica do treino (audit 2026-03-08)
    - fb
    - teste
    - "[field id=\"utm_source\"]"
    - facebook-ads-sitelink
    - utm_source
    - manychat
    - organico
    - bio
    - livesemanal
    - ig
    - org
  source_to_channel_mapping:     # dev/retreino — sources orgânicas que colapsam em canal existente
    youtube-bio: youtube
  term_mappings:                 # #63
    ig: instagram
    fb: facebook
  term_outros_patterns:          # #63
    - "--"
    - "{"
  term_long_id_threshold: 10     # #67

