utm:
  source_to_outros:
  - teste
  - '[field id="utm_source"]'
  - facebook-ads-sitelink
  - utm_source
  - manychat
  - organico
  - bio
  - livesemanal
  - org
  source_to_channel_mapping:
    youtube-bio: youtube
    # 'fb'/'ig' são abreviações de Meta — Source canônico é facebook-ads.
    # Term continua diferenciando IG/FB via term_mappings logo abaixo.
    fb: facebook-ads
    ig: facebook-ads
  # Whitelist final de Source (pós source_to_channel_mapping). Source fora
  # desta lista vira 'outros' — espelha o fallback que _unify_term já tem.
  # tiktok adicionado em 2026-05-05 — o gestor passou a rodar campanhas TikTok
  # Ads e o Source vinha sendo rebatizado pra 'outros', gerando ruído de
  # category drift no monitoring. Atualmente eventos TikTok não são enviados
  # à Meta (DT-CAPI-01 filtra por destination), então isto é só pra silenciar
  # o falso alerta. Se um dia conectar TikTok Ads server-side, o canônico já
  # está pronto.
  source_canonical_values:
  - facebook-ads
  - google-ads
  - youtube
  - tiktok
  - outros
  term_mappings:
    ig: instagram
    fb: facebook
  term_outros_patterns:
  - --
  - '{'
  term_long_id_threshold: 10
