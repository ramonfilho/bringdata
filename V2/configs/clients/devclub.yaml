    # idade e faixa_salarial removidas para paridade com modelo ativo (2a98e51c).
    # No pipeline antigo o ordinal falhava silenciosamente (nomes curtos não existiam no df)
    # → one-hot acidental → 59 features. core/encoding.py lê este yaml e executaria o ordinal
    # corretamente → 50 features. Fix: manter só dia_semana até próximo retreino intencional.
