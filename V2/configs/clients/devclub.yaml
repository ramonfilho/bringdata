    - "tem_computador"
  columns_to_remove:             # #34 — colunas removidas por data leakage (específicas do lançamento)
    - "Campaign"
    - "Content"
  columns_to_remove_post_cutoff: # #39 — colunas removidas após cutoff por alto missing
    - "Qual o seu nível em programação?"
  columns_to_drop_after_fe:     # #48 — lista canônica do treino (audit 2026-03-08)
