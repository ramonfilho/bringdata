  pesquisa_phone_column: "Telefone"     # #42
  telefone_comprimento_keep_values: [9, 11]  # #157 — 4=inválido, 10=obsoleto → 'outros'
  ordering_rules: null           # #2 — lógica de reordenação em código (telefone_comprimento_* por sufixo numérico)
  survey_column_stems:           # #52 — stems para categorizar features de pesquisa no feature registry
    - "gênero"
    - "idade"
    - "faz"
    - "faixa"
    - "cartão"
    - "estudou"
    - "faculdade"
    - "evento"
  utm_feature_prefixes_for_registry:    # #65 — prefixos de features UTM no feature registry
    - "Source_"
    - "Medium_"
    - "Term_"
  derived_feature_prefixes_for_registry:  # #66 — prefixos de features derivadas no feature registry
    - "nome_"
    - "email_"
    - "telefone_"
    - "dia_semana"
  nlp_columns: []                # reservado — manter vazio

# ---------------------------------------------------------------------------
# EncodingConfig — hardcodes #49, #51, #64, #70, #71 (Componente 3 — Fase 2)
# ---------------------------------------------------------------------------
encoding:
  ordinal_variables:             # #49 — fix 15/03: idade e faixa_salarial removidas (Opção A)
    # idade e faixa_salarial removidas para paridade com modelo ativo (2a98e51c).
    # No pipeline antigo o ordinal falhava silenciosamente (nomes curtos não existiam no df)
    # → one-hot acidental → 59 features. core/encoding.py lê este yaml e executaria o ordinal
    # corretamente → 50 features. Fix: manter só dia_semana até próximo retreino intencional.
    "dia_semana": [0, 1, 2, 3, 4, 5, 6]
  categorical_detection_max_unique: 20   # #64
  features_to_drop_after_encoding: []    # #51 — telefone_comprimento_8 não existe mais após grouping (#157)
  column_name_corrections: {}    # #70 — confirmado obsoleto em 18/03/2026: core/encoding.py produz
                                  # nomes normalizados que já batem com o feature registry de produção sem correções

# ---------------------------------------------------------------------------
# ModelConfig — hardcodes #1, #10, #53, #55, #56, #71, #72, #79, #89
# ---------------------------------------------------------------------------
model:
  hyperparameters:               # #1 — hiperparâmetros baseline (antes do tuning)
    n_estimators: 300
    max_depth: 8
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: "sqrt"
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1
  buyer_weights:                 # #158 — PESOS_COMPRADOR (dev/retreino); % recebido real por tipo
    guru:      1.00              # Guru: à vista, 100% recebido
    tmb_baixo: 0.84              # TMB Baixo: 83.5% recebido
    tmb_medio: 0.67              # TMB Médio: 67.1% recebido
    tmb_alto:  0.49              # TMB Alto: 48.6% recebido
    tmb_sem:   0.42              # TMB Sem classificação: 42.1% recebido
  mlflow_experiment_name: "devclub_lead_scoring"  # #10
  mlflow_experiment_id: "1"      # #71 — ID do experimento MLflow (usado no path de artefatos)
  model_name_template: "v1_devclub_rf_{split_method}_single"  # #53
  legacy_model_dir: "arquivos_modelo"  # #72 — diretório legado (fallback quando active_model.yaml falha)
  business_config_path: "api/business_config.py"  # #55 — path para atualização automática de recall
  tuning_improvement_thresholds:  # #56 — thresholds para adotar hiperparâmetros tunados
    recommended: 1.0              # > 1.0% melhoria → adotar automaticamente
    marginal: 0.3                 # > 0.3% melhoria → considerar manualmente
  metadata_filename_pattern: "model_metadata*.json"  # #89
  top_decils_to_monitor:         # #79 — decis de alta qualidade monitorados
    - "D9"
    - "D10"

